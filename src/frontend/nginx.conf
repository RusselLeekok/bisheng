map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 3001;
    server_name _;

    root /usr/share/nginx/html/platform;
    index index.html index.htm;
    client_max_body_size 200m;

    gzip on;
    gzip_comp_level 2;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml image/svg+xml;
    gzip_http_version 1.1;
    gzip_vary on;
    gzip_disable "MSIE [4-6] \.";

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires 0 always;
        add_header X-Frame-Options SAMEORIGIN always;
    }

    location / {
        try_files $uri $uri/ /index.html =404;
        add_header X-Frame-Options SAMEORIGIN always;
    }

    location = /workspace {
        return 301 /workspace/;
    }

    location /workspace/ {
        alias /usr/share/nginx/html/client/;
        index index.html index.htm;
        try_files $uri $uri/ /workspace/index.html;
        add_header X-Frame-Options SAMEORIGIN always;
    }

    location = /workspace/index.html {
        alias /usr/share/nginx/html/client/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires 0 always;
        add_header X-Frame-Options SAMEORIGIN always;
    }

    location ~ ^(/workspace)?/(api|health)(/|$) {
        rewrite ^/workspace(/.*)$ $1 break;
        proxy_pass http://backend:7860;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        add_header X-Frame-Options SAMEORIGIN always;
    }

    location ~ ^(/workspace)?/(bisheng|tmp-dir)(/|$) {
        rewrite ^/workspace(/.*)$ $1 break;
        proxy_pass http://minio:9000;
        proxy_read_timeout 300s;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
